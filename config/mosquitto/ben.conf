# ben.conf — configuration mosquitto pour le bus MQTT LOCAL de BEN.
# Déposé en /etc/mosquitto/conf.d/ben.conf par install.sh (device neuf) et update.sh (OTA).
#
# Le bus relie la façade radio (ben-radio) au décodeur/stockeur (ben-telemetry) sur le même Pi.
# Il ne sort JAMAIS de la machine et ne transporte que des trames déjà en clair côté interne.

# Écoute UNIQUEMENT en local (127.0.0.1) — aucun MQTT exposé sur le réseau (surface d'attaque nulle).
listener 1883 127.0.0.1
allow_anonymous true

# Persistance DÉSACTIVÉE : on n'utilise ni messages retained ni QoS 1 ni sessions persistantes
# → mosquitto tourne 100 % en mémoire, ZÉRO écriture sur la SD (préserve la carte, cf. politique BEN).
# Les trames sont déjà durablement stockées par ben-telemetry dans SQLite ; pas besoin d'un 2e store.
persistence false
