name: Deploy site to GitHub Pages

# Publie UNIQUEMENT docs/site/ (pages publiques de l'app : politique de
# confidentialité, etc.). Les docs techniques de docs/ ne sont pas exposées.
on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site
      - id: deployment
        uses: actions/deploy-pages@v4
