        history:
          - version: "1.0.0"
            released: "2026-05-19"

  pi0-lora-wired:       # Raspberry Pi Zero W with both direct TIC (wired) and LoRa reception
    rev01:
      pi:
        latest: "1.0.0"
        history:
          - version: "1.0.0"
            released: "2026-05-19"
      arduino:
        minimum: "1.0.0"
        latest: "1.0.0"
        history:
          - version: "1.0.0"
            released: "2026-05-19"

