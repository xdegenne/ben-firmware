# BEN Device — Compatibility Matrix
# Source of truth for all device models, hardware revisions,
# software versions and update paths.
#
# Sections:
#   devices  — informational only (history, release notes)
#   updates  — machine-readable update paths consumed by check_update.py

devices:

  pi0-lora:             # Arduino Pro Mini (TIC reader) + Raspberry Pi Zero W (LoRa receiver + publisher)
    rev01:
      pi:
        latest: "0.0.13"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
            notes: "first dev release (published, no devices in field)"
          - version: "0.0.2"
            released: "2026-05-30"
            notes: "log-only baseline (Influx stripped, hostname rename)"
          - version: "0.0.8"
            released: "2026-05-31"
            notes: "fix SPI + rpi-lgpio + WorkingDirectory + RPi.GPIO transitive uninstall + raspi_lora SNR sign"
          - version: "0.0.9"
            released: "2026-05-31"
            notes: "heartbeat LED présence calme (0.4s × intensité 10/255)"
          - version: "0.0.10"
            released: "2026-05-31"
            notes: "heartbeat LED encore plus discret (0.1s × intensité 5/255, séparés de 1s)"
          - version: "0.0.11"
            released: "2026-05-31"
            notes: "SNR_MAX_PLAUSIBLE 12 → 20 pour tolérer les SNR close-range valides"
          - version: "0.0.12"
            released: "2026-05-31"
            notes: "heartbeat UX-driven : OK très court (50ms × 5/255), erreur visible (300ms × 8/255)"
          - version: "0.0.13"
            released: "2026-05-31"
            notes: "flashs RX jaune + HMAC OK vert discrets 50ms × 5/255 ; heartbeat rapproché (sleep 0.5s)"
      arduino:
        minimum: "0.0.1"
        latest: "0.0.1"
        history:
          - version: "0.0.1"
            released: "2026-05-30"

  pi0-wired:            # Raspberry Pi Zero W only (direct TIC reader + publisher)
    rev01:
      pi:
        latest: "0.0.6"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
            notes: "first dev release (published, no devices in field)"
          - version: "0.0.2"
            released: "2026-05-30"
            notes: "log-only baseline (Influx stripped, hostname rename)"
          - version: "0.0.3"
            released: "2026-05-31"
            notes: "agent LED: dim yellow wake (30%), violet stale alert (>5min); WATCHDOG 5min→10min"
          - version: "0.0.4"
            released: "2026-05-31"
            notes: "LED bonk-bonk : 2 flashs violet par cycle raté (remplace single-violet stale)"
          - version: "0.0.5"
            released: "2026-05-31"
            notes: "LED silence radio — plus aucun blink (for sleeping operators)"
          - version: "0.0.6"
            released: "2026-05-31"
            notes: "LED 5% partout : jaune wake / vert trame OK / rouge trame KO"

  pi0-lora-wired:       # Raspberry Pi Zero W with both direct TIC (wired) and LoRa reception
    rev01:
      pi:
        latest: "0.0.2"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
            notes: "first dev release (published, no devices in field)"
          - version: "0.0.2"
            released: "2026-05-30"
            notes: "log-only baseline (Influx stripped, hostname rename)"
      arduino:
        minimum: "0.0.1"
        latest: "0.0.1"
        history:
          - version: "0.0.1"
            released: "2026-05-30"

updates:

  pi0-lora:
    - from: "0.0.8"
      to: "0.0.9"
      tag: "pi-0.0.9"
      script: "updates/pi0-lora/0.0.8_to_0.0.9/update.sh"
    - from: "0.0.9"
      to: "0.0.10"
      tag: "pi-0.0.10"
      script: "updates/pi0-lora/0.0.9_to_0.0.10/update.sh"
    - from: "0.0.10"
      to: "0.0.11"
      tag: "pi-0.0.11"
      script: "updates/pi0-lora/0.0.10_to_0.0.11/update.sh"
    - from: "0.0.11"
      to: "0.0.12"
      tag: "pi-0.0.12"
      script: "updates/pi0-lora/0.0.11_to_0.0.12/update.sh"
    - from: "0.0.12"
      to: "0.0.13"
      tag: "pi-0.0.13"
      script: "updates/pi0-lora/0.0.12_to_0.0.13/update.sh"

  pi0-wired:
    - from: "0.0.2"
      to: "0.0.3"
      tag: "pi-0.0.3"
      script: "updates/pi0-wired/0.0.2_to_0.0.3/update.sh"
    - from: "0.0.3"
      to: "0.0.4"
      tag: "pi-0.0.4"
      script: "updates/pi0-wired/0.0.3_to_0.0.4/update.sh"
    - from: "0.0.4"
      to: "0.0.5"
      tag: "pi-0.0.5"
      script: "updates/pi0-wired/0.0.4_to_0.0.5/update.sh"
    - from: "0.0.5"
      to: "0.0.6"
      tag: "pi-0.0.6"
      script: "updates/pi0-wired/0.0.5_to_0.0.6/update.sh"

  pi0-lora-wired:
    []                  # no in-field transitions yet
