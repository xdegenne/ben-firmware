          - version: "0.0.28"
            released: "2026-06-05"
            notes: "Vérification couleur au provisioning BLE (confirme le bon boîtier). led.py : palette daltonien (B/J/Blanc/Rouge, sans vert) + start_sequence. main.py : GATT VERIFY/VERIFY_STATUS, hook on_connect qui génère un code couleur affiché sur la LED, WIFI_CONFIG refusé tant que non vérifié. ⚠ CASSANT : nécessite l'app avec l'étape VERIFY pour provisionner ; n'impacte QUE le provisioning BLE (un device en service en mode normal n'est pas affecté). Code en place via checkout ; aucun service à redémarrer. Cf. docs/ble-color-verification.md. (NB : pi-0.0.27 avait été taggé sans son update.sh.sha256 → OTA en échec, jamais appliqué ; 0.0.28 = même contenu + checksum, transition directe 0.0.26→0.0.28.)"
          - version: "0.0.29"
            released: "2026-06-07"
            notes: "Fix race de services au provisioning. ben-tic-reader / ben-lora-receiver perdent leur autostart (WantedBy retiré) : ils sont désormais lancés UNIQUEMENT par check_network.py quand le réseau est up. Avant, ils démarraient au boot en doublon et tuaient ben-ble-provisioner via Conflicts → bug 'code couleur affiché puis ré-écoute BLE en boucle', provisioning impossible (vu en démo sans Linky). De plus check_network détecte 'jamais provisionné' (absence de connexion ben-provisioned) → bascule BLE directe sans pinguer 30s au premier boot. Migration : réinstalle les units + systemctl disable des readers. N'impacte pas un device en service (le reader tourne jusqu'au prochain reboot où check_network le relance)."
          - version: "0.0.30"
            released: "2026-06-07"
            notes: "tic-reader (wired) : wake-up LED jaune → bleu (cosmétique) ; PERIOD_S 30s → 15s (lecture TIC toutes les 15s). Migration : try-restart ben-tic-reader (applique le nouveau code s'il tourne, no-op sinon → safe en mode provisioning)."
          - version: "0.0.31"
            released: "2026-06-07"
            notes: "Provisioner BLE — UX vérif couleur : code correct → 3 blinks verts rapides (au lieu du vert fixe permanent) ; délai de 10s avant d'afficher le code couleur à la connexion (blink violet/jaune d'attente pendant le délai, puis le code se répète au rythme normal ~1,5s). + ben-led-release.service : flash blanc 'welcome' rendu atomique (3 canaux R/G/B en une seule commande pinctrl) — avant, 3 commandes séparées faisaient voir un balayage rouge→jaune→blanc→cyan→bleu au boot. Migration : réinstalle ben-led-release.service + daemon-reload (effet au prochain boot) ; provisioner on-demand donc rien d'autre à redémarrer."
          - version: "0.0.32"
            released: "2026-06-07"
            notes: "Provisioner BLE — feedback connexion : à la connexion Bluetooth, arrêt du blink d'attente violet/jaune + 2 flashs verts rapides (= connecté), puis délai 10s, puis boucle du code couleur. N'impacte que le provisioning BLE ; rien à redémarrer (provisioner on-demand)."
          - version: "0.0.33"
            released: "2026-06-07"
            notes: "Provisioner BLE — feedback succès connexion réseau : sur succès WiFi, 2 flashs verts rapides au lieu de 3 flashs + vert tenu permanent (cohérence UX, plus de vert fixe). N'impacte que le provisioning BLE ; rien à redémarrer (provisioner on-demand)."
          - version: "0.0.34"
            released: "2026-06-08"
            notes: "Modèle de niveau « course [talon, plafond] » (remplace les percentiles P30/P70/P90, qui dégénéraient sur les foyers à faible base : un frigo seul ~150 W était sur-noté niveau 3, vu en prod sur ben-0003/Neuville). niveau = position de la PAPP entre le talon (P15, ancrage bas) et le plafond = papp_max_alltime (high-water mark MONOTONE de la PAPP, jamais décrémenté, survit au prune 3 mois ; « si c'est arrivé ça arrivera encore »). ratio=(PAPP−talon)/(plafond−talon), bandes 0,10/0,40/0,70. db.py : colonnes level_profile.talon + .papp_max_alltime (maintenu par record_measurement) + index idx_meas_pdl_papp (ALTER/index auto). levels.py : talon en SQL, cold-start (ou plafond<=talon) → niveau 2. Plus aucun seuil absolu en watts : bornes tirées des données du foyer → adaptatif ET non-dégénéré. update.sh : backfill one-shot du plafond depuis l'historique + restart ben-local-api + reader + recalcul talon ; pas de reboot. Firmware only (l'app lit déjà reading.level)."
