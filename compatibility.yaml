# BEN Device — Update Matrix (machine-readable)
#
# SEUL fichier consommé par l'agent OTA (src/pi/updater : find_next_transition).
# Fichier volontairement MINIMAL : aucune release note ici (elles vivent dans ../CHANGELOG.md).
#
# updates_caps — flux d'update UNIQUE keyé sur softwareVersion (from → to), « mono-flux » :
#   plus de clé par modèle. Chaque transition = un tag Git signé GPG + un update.sh
#   CAPABILITY-AWARE (gate has_cap / cap_hw : un device hors-capability no-op et bump quand
#   même sa version). L'agent part de la version courante et enchaîne les `from == courant`.
#
# Release notes (humain, toutes versions Pi + Arduino) : ../CHANGELOG.md
# Ancienne matrice pré-ménage (history par-modèle + fallback `updates:`) : git show pi-0.9.1:compatibility.yaml

updates_caps:
  - from: "0.6.1"
    to:   "0.7.0"
    tag:  "pi-0.7.0"
    script: "updates/0.6.1_to_0.7.0/update.sh"   # durcissement watchdog LoRa (capability-aware : has_cap lora ; wired skip)
  - from: "0.7.0"
    to:   "0.8.0"
    tag:  "pi-0.8.0"
    script: "updates/0.7.0_to_0.8.0/update.sh"   # relabel model → commercial (Filaire/Radio) — TOUS les devices
  - from: "0.8.0"
    to:   "0.8.1"
    tag:  "pi-0.8.1"
    script: "updates/0.8.0_to_0.8.1/update.sh"   # fix agent OTA : clobber device.json (self-heal relabel + re-read avant bump)
  - from: "0.8.1"
    to:   "0.8.2"
    tag:  "pi-0.8.2"
    script: "updates/0.8.1_to_0.8.2/update.sh"   # fixes unboxing BLE (provisioner) : DEVICE_INFO compact (device.json>MTU iOS tronqué → app iOS KO), scan WiFi unique (rescan 30s affamait le lien BLE → décrochage Android), agent pairing Just Works (BlueZ 5.x/Service Changed). No-op pour un device en service (provisioner off) ; effet au prochain provisioning.
  - from: "0.8.2"
    to:   "0.8.3"
    tag:  "pi-0.8.3"
    script: "updates/0.8.2_to_0.8.3/update.sh"   # RETRAIT de l'agent de pairing (leurre) : il faisait bonder iOS → re-découverte post-bond → gel couleurs/verify au 1er unboxing + « Peer removed » au re-provisioning. Le vrai fix iOS = la MTU (0.8.2). No-op ; effet au prochain provisioning.
  - from: "0.8.3"
    to:   "0.8.4"
    tag:  "pi-0.8.4"
    script: "updates/0.8.3_to_0.8.4/update.sh"   # 2 fixes terrain : (1) lora-receiver — watchdog de SILENCE (RX vivant mais sourd : IRQ RX morte, SPI lisible → self-test aveugle), restart à backoff exponentiel 5min→×2→plafond 1h, persisté, reset à la 1re trame (incident ben-0010 17/07, 55 min de silence sans relance) ; (2) provisioner — garde anti-doublon on_connect (bluezero l'appelle 2× Connected+ServicesResolved sur tél lent → écrasait la reco couleurs → échec unboxing MIUI). Restart ben-lora-receiver sur les devices lora ; provisioner : effet au prochain unboxing.
  - from: "0.8.4"
    to:   "0.8.5"
    tag:  "pi-0.8.5"
    script: "updates/0.8.4_to_0.8.5/update.sh"   # échelle de jauge RÉSOLUE CÔTÉ BOÎTIER : /live ne renvoyait le plafond OBSERVÉ (high-water mark) qu'inconditionnellement → juste après l'unboxing ce max ≈ conso courante → conso faible affichée ROUGE dans l'app. Fix local_api.py : plafond observé UNIQUEMENT si le foyer est CONNU (même gate que le niveau, levels.is_known : ≥200 pts, ≥2j, dynamique), sinon l'ABONNEMENT (PREF/ISOUSC, sinon 9000). L'app affiche le plafond tel quel (n'arbitre plus). Redémarre ben-local-api sur tous les modèles.
  - from: "0.8.5"
    to:   "0.8.6"
    tag:  "pi-0.8.6"
    script: "updates/0.8.5_to_0.8.6/update.sh"   # FIX récepteur : l'IINST (2e courbe histo) était ENVOYÉE par l'émetteur ET décodée par frame_codec, mais on_recv_curve ne la rangeait pas en base (boucle sur PAPP seulement) → colonne iinst NULL en histo/LoRa. On ajoute labels["IINST"]=iinst[i] dans la boucle de stockage. Redémarre ben-lora-receiver sur les devices lora. Sans effet en standard (pas de 2e courbe IINST).
  - from: "0.8.6"
    to:   "0.8.7"
    tag:  "pi-0.8.7"
    script: "updates/0.8.6_to_0.8.7/update.sh"   # « Au revoir » au désappairage : /unprovision fait 3 flashs VIOLETS sur la LED RGB juste avant le poweroff (signal clair de départ). local_api._unprovision stoppe désormais les readers TOUJOURS (libère les pins LED + ferme la base) puis flash. Redémarre ben-local-api (tous modèles). Effet au prochain /unprovision.
  - from: "0.8.7"
    to:   "0.9.1"
    tag:  "pi-0.9.1"
    script: "updates/0.8.7_to_0.9.1/update.sh"   # FACADE RADIO + FIX paho. La 0.9.0 (facade) oubliait python3-paho-mqtt (lib cliente MQTT) -> ben-radio crashe a l import -> crash-loop -> boucle reboot (incident ben-0011/ben-0003). Tag 0.9.0 immuable -> on corrige en 0.9.1 = MEME facade AVEC paho + garde-fou (abort AVANT cutover si paho absent -> monolithe preserve, pas de boucle). On REDIRIGE 0.8.7 direct vers 0.9.1 (plus par la 0.9.0 cassee). Decoupe monolithe -> ben-radio + ben-telemetry via bus MQTT local, canal commande volet chiffre, derivation cle par-device, adresse LoRa EEPROM, topic LED ben/led. GATED lora-tic-receiver.
  - from: "0.9.0"
    to:   "0.9.1"
    tag:  "pi-0.9.1"
    script: "updates/0.8.7_to_0.9.1/update.sh"   # RATTRAPAGE des devices qui ont REUSSI 0.9.0 (avaient paho) : meme script idempotent -> installe paho si besoin, re-restart facade, RE-ARME l escalade (le meme nom de drop-in ota-cutover-no-reboot.conf est nettoye au §7).
  - from: "0.9.1"
    to:   "0.9.2"
    tag:  "pi-0.9.2"
    script: "updates/0.9.1_to_0.9.2/update.sh"   # ACK applicatif crypto-vérifié des trames boot (anti cross-talk multi-logement) — cf. CHANGELOG 0.9.2. Pur code ben_radio.py. GATED lora-tic-receiver.
