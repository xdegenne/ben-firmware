            released: "2026-06-05"
            notes: "Tarif HC/HP exposé par l'API — cf. note pi0-lora 0.0.26. Colonne `tariff` sur measurements (PTEC wired → index actif), /live et /measurements l'ajoutent. L'app affiche HC/HP (chip + zones de courbe). update.sh redémarre ben-local-api + le reader ; pas de reboot."
          - version: "0.0.28"
            released: "2026-06-05"
            notes: "Vérification couleur au provisioning BLE (confirme le bon boîtier). led.py : palette daltonien (B/J/Blanc/Rouge, sans vert) + start_sequence. main.py : GATT VERIFY/VERIFY_STATUS, hook on_connect qui génère un code couleur affiché sur la LED, WIFI_CONFIG refusé tant que non vérifié. ⚠ CASSANT : nécessite l'app avec l'étape VERIFY pour provisionner ; n'impacte QUE le provisioning BLE (un device en service en mode normal n'est pas affecté). Code en place via checkout ; aucun service à redémarrer. Cf. docs/ble-color-verification.md. (NB : pi-0.0.27 avait été taggé sans son update.sh.sha256 → OTA en échec, jamais appliqué ; 0.0.28 = même contenu + checksum, transition directe 0.0.26→0.0.28.)"
          - version: "0.0.29"
            released: "2026-06-07"
            notes: "Fix race de services au provisioning. ben-tic-reader / ben-lora-receiver perdent leur autostart (WantedBy retiré) : ils sont désormais lancés UNIQUEMENT par check_network.py quand le réseau est up. Avant, ils démarraient au boot en doublon et tuaient ben-ble-provisioner via Conflicts → bug 'code couleur affiché puis ré-écoute BLE en boucle', provisioning impossible (vu en démo sans Linky). De plus check_network détecte 'jamais provisionné' (absence de connexion ben-provisioned) → bascule BLE directe sans pinguer 30s au premier boot. Migration : réinstalle les units + systemctl disable des readers. N'impacte pas un device en service (le reader tourne jusqu'au prochain reboot où check_network le relance)."
          - version: "0.0.30"
            released: "2026-06-07"
            notes: "tic-reader (wired) : wake-up LED jaune → bleu (cosmétique) ; PERIOD_S 30s → 15s (lecture TIC toutes les 15s). Migration : try-restart ben-tic-reader (applique le nouveau code s'il tourne, no-op sinon → safe en mode provisioning)."
          - version: "0.0.31"
            released: "2026-06-07"
            notes: "Provisioner BLE — UX vérif couleur : code correct → 3 blinks verts rapides (au lieu du vert fixe permanent) ; délai de 10s avant d'afficher le code couleur à la connexion (blink violet/jaune d'attente pendant le délai, puis le code se répète au rythme normal ~1,5s). + ben-led-release.service : flash blanc 'welcome' rendu atomique (3 canaux R/G/B en une seule commande pinctrl) — avant, 3 commandes séparées faisaient voir un balayage rouge→jaune→blanc→cyan→bleu au boot. Migration : réinstalle ben-led-release.service + daemon-reload (effet au prochain boot) ; provisioner on-demand donc rien d'autre à redémarrer."
          - version: "0.0.32"
            released: "2026-06-07"
            notes: "Provisioner BLE — feedback connexion : à la connexion Bluetooth, arrêt du blink d'attente violet/jaune + 2 flashs verts rapides (= connecté), puis délai 10s, puis boucle du code couleur. N'impacte que le provisioning BLE ; rien à redémarrer (provisioner on-demand)."
          - version: "0.0.33"
            released: "2026-06-07"
            notes: "Provisioner BLE — feedback succès connexion réseau : sur succès WiFi, 2 flashs verts rapides au lieu de 3 flashs + vert tenu permanent (cohérence UX, plus de vert fixe). N'impacte que le provisioning BLE ; rien à redémarrer (provisioner on-demand)."
          - version: "0.0.34"
            released: "2026-06-08"
            notes: "Modèle de niveau « course [talon, plafond] » (remplace les percentiles P30/P70/P90, qui dégénéraient sur les foyers à faible base : un frigo seul ~150 W était sur-noté niveau 3, vu en prod sur ben-0003/Neuville). niveau = position de la PAPP entre le talon (P15, ancrage bas) et le plafond = papp_max_alltime (high-water mark MONOTONE de la PAPP, jamais décrémenté, survit au prune 3 mois ; « si c'est arrivé ça arrivera encore »). ratio=(PAPP−talon)/(plafond−talon), bandes 0,10/0,40/0,70. db.py : colonnes level_profile.talon + .papp_max_alltime (maintenu par record_measurement) + index idx_meas_pdl_papp (ALTER/index auto). levels.py : talon en SQL, cold-start (ou plafond<=talon) → niveau 2. Plus aucun seuil absolu en watts : bornes tirées des données du foyer → adaptatif ET non-dégénéré. update.sh : backfill one-shot du plafond depuis l'historique + restart ben-local-api + reader + recalcul talon ; pas de reboot. Firmware only (l'app lit déjà reading.level)."
          - version: "0.0.35"
            released: "2026-06-08"
            notes: "/health expose lastUpdateTs (epoch s) = date de la dernière MAJ firmware, lue via la mtime de device.json (réécrit seulement à un changement de version OTA ou au provisioning). local_api.py : _device_info() ajoute le champ. Pas de champ stocké, pas de migration, aucun reader touché. update.sh : restart ben-local-api ; pas de reboot. Permet à l'app d'afficher « Mis à jour le … » et de repérer un device en retard."
          - version: "0.0.36"
            released: "2026-06-08"
            notes: "(1) Palette LED de vérif BLE recalibrée (led.py) : BLANC CHAUD (canal bleu écrasé, B≈0,25×R) car la LED bleue est perceptuellement plus vive → le blanc virait au bleu (confusion blanc/bleu constatée au provisioning). Palette daltonien conservée (axe bleu↔jaune + luminosité, sans vert). Provisioner on-demand → pris au prochain provisioning. (2) API locale : POST /unprovision (désappairage) — supprime la connexion WiFi `ben-provisioned` (→ provisioning BLE au reboot), efface optionnellement les données (?wipe=1), puis reboot ; garde l'identité (certs, deviceId). SANS auth (raccourci assumé : LAN + confirmation app). update.sh : restart ben-local-api ; pas de reboot. L'app ajoute une carte « Désappairer » (Avancé) avec option wipe."
          - version: "0.0.37"
            released: "2026-06-08"
            notes: "API locale : POST /unprovision corrigé. Bug : on supprimait la connexion WiFi AVANT de répondre → couper `ben-provisioned` tue le lien TCP, l'app ne recevait jamais l'ack (et le diagnostic était aveugle car l'API silence log_message par défaut). Fix : on répond d'abord, PUIS désappairage + reboot en ASYNCHRONE (threading.Timer 2 s) ; on oublie TOUTES les connexions WiFi (ben-provisioned + éventuel profil opérateur `wifi` du golden, qui sinon reconnectait en autoconnect) ; ajout de logs « [unprovision] … ». update.sh : restart ben-local-api ; pas de reboot."
          - version: "0.0.38"
            released: "2026-06-08"
            notes: "Provisioning BLE — phase d'APPRENTISSAGE des couleurs avant le test d'association. led.py : la boucle de séquence accepte un callback (on_show + tokens) qui notifie la couleur affichée. main.py : 2 caracs GATT — PREVIEW_CMD (…0007, write '1'/'0') et PREVIEW_COLOR (…0008, read|notify B|Y|W|R|-). '1' joue les 4 couleurs en boucle (ordre fixe BYWR) en notifiant la couleur courante (l'app surligne la pastille en synchro) ; '0' (bouton Suivant) arrête et enchaîne sur le code de test. Repli : si l'app ne pilote pas PREVIEW, le code de test s'affiche après VERIFY_DISPLAY_DELAY_SEC comme avant. Durée d'affichage de chaque couleur du CODE de test allongée (VERIFY_ON_SEC=1.3 s) pour laisser le temps de lire. Provisioner on-demand → pris au prochain mode BLE, rien à redémarrer, pas de reboot. Côté app : nouvel écran « Repérez les couleurs » entre le scan et le test."
          - version: "0.0.39"
            released: "2026-06-08"
            notes: "Provisioning BLE — 2 corrections UX de la LED. (1) Échec WiFi (ex. mauvais mot de passe) : le BLE reste connecté et l'utilisateur peut re-saisir → set_status() ne rejoue PLUS le blink violet/jaune (« aucun téléphone, à configurer ») qui laissait croire à un reset ; on garde les 3 flashs rouges (échec) puis on ÉTEINT (état « connecté, en attente de saisie »). (2) Fin de l'apprentissage des couleurs (PREVIEW_CMD='0') : on arrête la boucle + éteint, puis on attend VERIFY_AFTER_PREVIEW_SEC (3 s) avant de démarrer le code de test, le temps d'arriver sur l'écran de test sans rater le début. Provisioner on-demand → rien à redémarrer, pas de reboot."
          - version: "0.0.40"
            released: "2026-06-13"
            notes: "Courbe temps réel (pi-wired). Lecture TIC AU FIL DE L'EAU (suppression du sleep 15s, event-driven sur la trame → courbe fine ~1,5s au lieu de 1/15s) + écritures BDD BATCHÉES (1 commit/15s via executemany → ménage la SD malgré ~7× plus de points). API : nouvel endpoint /curve (agrégé min/max/avg, bucketing ABSOLU + quantifié pour stabilité au pan, centroïde temporel, index porté) ; /measurements degrade-safe (agrège au lieu de tronquer) ; /pdls expose first_ts. db.py/local_api.py partagés mais ADDITIFS (pas de changement de schéma, reader LoRa intact) → seuls les wired bumpent. AUCUNE migration. update.sh = restart ben-tic-reader + ben-local-api."
          - version: "0.0.42"
            released: "2026-06-18"
            notes: "Chantier ISOUSC : lecture + stockage de l'intensité souscrite par PDL (level_profile.isousc, write-on-change) ; le wired la lit dans chaque trame TIC (étiquette ISOUSC). /live expose isousc + maxVa (=ISOUSC×230) pour les réglages app + l'étalonnage de la jauge. Migration BDD = ALTER conditionnel (colonne isousc), idempotent. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.43"
            released: "2026-06-23"
            notes: "Mode TIC STANDARD (Enedis-NOI-CPT_54E) bout-en-bout + dorsale stockage index bi-mode. main_uart.py BI-MODE : auto-détection historique↔standard au boot (sonde 1200/9600, mode persisté tic-state.json, re-détection sur silence via watchdog) ; parseur standard (séparateur HT, checksum HT-de-queue inclus, horodate DATE→meter_ts) ; papp = SINSTS net signé. Stockage GÉNÉRIQUE (src_standard, index_id=NTARF, index_value=EASF[NTARF]) + inject_total (EAIT) + meter_ts. MIGRATION BDD : ALTER ×5 (src_standard/index_id/index_value/inject_total/meter_ts), idempotente, NON bloquante, double-écriture base/hchc/hchp. /live expose tic_mode. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.44"
            released: "2026-06-23"
            notes: "LED de boot : 3 flashs bleus brefs au démarrage (aligné avec le récepteur LoRa). Cosmétique pur, AUCUNE migration. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.45"
            released: "2026-06-23"
            notes: "Unpair « supprimer les données » (POST /unprovision?wipe=1) : on STOPPE le reader avant le rm de la base (wipe propre) puis on ÉTEINT le boîtier (poweroff) au lieu de reboot → prépa livraison béta (part hors tension). Unpair simple → reboot (re-pairing BLE) inchangé. Modif local_api.py. AUCUNE migration. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.46"
            released: "2026-06-24"
            notes: "Alignement no-op avec pi0-lora 0.0.46 (trame courbe LoRa v0x05). curve_codec.py n'est utilisé QUE par le récepteur LoRa → AUCUN impact sur le wired (lecture TIC directe, pas de trame LoRa). Bump pour garder les deux modèles + INITIAL_TAG alignés. AUCUNE migration. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.47"
            released: "2026-06-25"
            notes: "Désappairage : POST /unprovision ÉTEINT TOUJOURS le boîtier (poweroff), avec ou sans wipe (avant : reboot quand pas de wipe). Au prochain allumage, sans WiFi → mode configuration (BLE). Signal d'extinction uniforme. Modif local_api.py. AUCUNE migration. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.48"
            released: "2026-06-26"
            notes: "Chantier ISOUSC STANDARD : calibrage de la jauge en mode standard via PREF (puiss. de réf., kVA — le standard ne fournit pas ISOUSC en A). db.py : colonne level_profile.pref (ALTER conditionnel idempotent) + record_pref/get_pref. main_uart.py (wired) : record_pref on-change (PREF déjà parsé). local_api : /live arbitre maxVa = standard ? pref×1000 : isousc×230 (+ expose pref). MIGRATION = ALTER pref (idempotente, non bloquante). Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.49"
            released: "2026-07-01"
            notes: "Chantier index énergie bi-mode, Lot B (exposition API). Idem pi0-lora : db.py expose l'index GÉNÉRIQUE (index_id, index_value, src_standard, inject_total) + flag producer dans /live, /measurements et curve_buckets — débloque le coût/conso en mode STANDARD (base/hchc/hchp NULL, index dans index_value). PERF : index COUVRANT idx_meas_pdl_ts_papp (pdl_index,ts,papp) remplace idx_meas_pdl_ts → l'agrégation /curve se résout depuis l'index. MIGRATION = index couvrant créé + ancien droppé au 1er db.connect (schéma, idempotent ; ~qq s one-shot sur grosse base, NON destructif, aucune perte). Exposition API purement ADDITIVE (app pas-à-jour intacte). Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.50"
            released: "2026-07-01"
            notes: "Chantier index énergie bi-mode, Lot B (suite) : endpoint /consumption. Idem pi0-lora : le carry-forward (conso PAR REGISTRE sur une plage) est calculé SERVER-SIDE — Pi maintenant, cloud plus tard, MÊME contrat. db.py : consumption(pdl,since,until) → {by_register:[{src_standard,index_id,wh}],total_wh} ; par registre MAX(index)-MIN(index) (COALESCE index_value/base/hchc/hchp → bi-mode + legacy). local_api : GET /consumption?pdl_index&since&until. L'app applique le prix (Σ wh×prix moyen ; par registre à terme). AUCUNE migration (lecture seule). Endpoint ADDITIF. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.51"
            released: "2026-07-01"
            notes: "Idem pi0-lora : robustesse aux index_value=0 parasites. db.py : /consumption filtre COALESCE(...) > 0 ; écriture (_generic_cols) normalise index_value=0 → NULL. Corrige le coût délirant (index absolu ~15 MWh renvoyé par MAX-MIN). AUCUNE migration. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.52"
            released: "2026-07-02"
            notes: "CHECKPOINT WAL périodique : db.prune() fait PRAGMA wal_checkpoint(TRUNCATE) (~1×/h) → le fichier -wal (qui ne se tronque jamais seul) reste borné, accélère les lectures ; le tic-reader wired exécute prune → bénéficie du fix. Maintenance pure, aucune donnée modifiée. (L'instrumentation INDEX0 de pi0-lora est côté récepteur LoRa → sans objet en wired.) AUCUNE migration. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.53"
            released: "2026-07-02"
            notes: "MIGRATION backfill index générique legacy (idem pi0-lora). db.connect() dérive index_id/index_value de tariff + base/hchc/hchp pour les vieilles lignes histo (index_value NULL). Corrige /consumption sur legacy HC/HP (sur-comptage ~+30 % sinon : ben-0003 43486 au lieu de 33252 Wh/7j). ONE-SHOT via user_version, idempotent. UPDATE en masse au 1er db.connect du tic-reader après MAJ (~qq s ; ben-0003 ~241k lignes). Données non perdues, index_value peuplé. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.54"
            released: "2026-07-03"
            notes: "Chantier « unification labels + contrat », côté WIRED. main_uart lit LTARF + le contrat (NGTF en standard / OPTARIF en historique, mode-agnostique) directement dans la TIC et les stocke (tariff_labels keyée par contrat + level_profile.ngtf). Résolution de label UNIFIÉE côté serveur (resolve_label) + API : /live.tariff_label + /live.contract + nouvel endpoint /registers. STRICTEMENT ADDITIF : aucun champ retiré/renommé → app legacy inchangées ; histo intact (LTARF absent en histo → skip ; OPTARIF capté comme contrat). MIGRATION idempotente au 1er db.connect (CREATE tariff_labels + ALTER level_profile.ngtf). Transition = restart ben-tic-reader + ben-local-api."

