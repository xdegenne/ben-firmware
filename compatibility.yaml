# BEN Device — Compatibility Matrix
# Source of truth for all device models, hardware revisions,
# software versions and update paths.
#
# Sections:
#   devices  — informational only (history, release notes)
#   updates  — machine-readable update paths consumed by check_update.py

devices:

  pi0-lora:             # Arduino Pro Mini (TIC reader) + Raspberry Pi Zero W (LoRa receiver + publisher)
    rev01:
      pi:
        latest: "0.0.18"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
            notes: "first dev release (published, no devices in field)"
          - version: "0.0.2"
            released: "2026-05-30"
            notes: "log-only baseline (Influx stripped, hostname rename)"
          - version: "0.0.8"
            released: "2026-05-31"
            notes: "fix SPI + rpi-lgpio + WorkingDirectory + RPi.GPIO transitive uninstall + raspi_lora SNR sign"
          - version: "0.0.9"
            released: "2026-05-31"
            notes: "heartbeat LED présence calme (0.4s × intensité 10/255)"
          - version: "0.0.10"
            released: "2026-05-31"
            notes: "heartbeat LED encore plus discret (0.1s × intensité 5/255, séparés de 1s)"
          - version: "0.0.11"
            released: "2026-05-31"
            notes: "SNR_MAX_PLAUSIBLE 12 → 20 pour tolérer les SNR close-range valides"
          - version: "0.0.12"
            released: "2026-05-31"
            notes: "heartbeat UX-driven : OK très court (50ms × 5/255), erreur visible (300ms × 8/255)"
          - version: "0.0.13"
            released: "2026-05-31"
            notes: "flashs RX jaune + HMAC OK vert discrets 50ms × 5/255 ; heartbeat rapproché (sleep 0.5s)"
          - version: "0.0.14"
            released: "2026-06-01"
            notes: "BLE WiFi provisioning + boot-time network check — NEVER DEPLOYED (tag pi-0.0.14 publié mais update.sh.sha256 manquant)."
          - version: "0.0.15"
            released: "2026-06-01"
            notes: "tag pi-0.0.15 publié avec .sha256 fix. La transition no-op 0.0.14 → 0.0.15 a réussi sur ben-0003. La transition 0.0.13 → 0.0.15 contenait un bug d'apt redirect (sudo n'élève pas le `>` shell, script tournait comme `ben`) → ben-0001 stuck à 0.0.13. Voir 0.0.16."
          - version: "0.0.16"
            released: "2026-06-01"
            notes: "fix update.sh : suppression du redirect bash `> /var/log/...` qui faisait fail le script tournant comme `ben`. Transitions ajoutées 0.0.15 → 0.0.16 (no-op) pour aligner ben-0003."
          - version: "0.0.17"
            released: "2026-06-01"
            notes: "tag pi-0.0.17 PUBLIÉ avec un update.sh foireux (strip gpio=13=op,dh du config.txt + reboot, perte du boot indicator). ben-0001 a effectivement OTA'd à 0.0.17 et a perdu le boot indicator. Voir 0.0.18 pour la fix."
          - version: "0.0.18"
            released: "2026-06-01"
            notes: "fix 0.0.17 : restaure gpio=13=op,dh dans config.txt si manquant + installe ben-led-release.service (oneshot Before= tous les services BEN qui libère les pins via pinctrl). Transitions 0.0.16 → 0.0.18 et 0.0.17 → 0.0.18 (saute la version 0.0.17 buggy)."
      arduino:
        minimum: "0.0.1"
        latest: "0.0.1"
        history:
          - version: "0.0.1"
            released: "2026-05-30"

  pi0-wired:            # Raspberry Pi Zero W only (direct TIC reader + publisher)
    rev01:
      pi:
        latest: "0.0.18"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
            notes: "first dev release (published, no devices in field)"
          - version: "0.0.2"
            released: "2026-05-30"
            notes: "log-only baseline (Influx stripped, hostname rename)"
          - version: "0.0.3"
            released: "2026-05-31"
            notes: "agent LED: dim yellow wake (30%), violet stale alert (>5min); WATCHDOG 5min→10min"
          - version: "0.0.4"
            released: "2026-05-31"
            notes: "LED bonk-bonk : 2 flashs violet par cycle raté (remplace single-violet stale)"
          - version: "0.0.5"
            released: "2026-05-31"
            notes: "LED silence radio — plus aucun blink (for sleeping operators)"
          - version: "0.0.6"
            released: "2026-05-31"
            notes: "LED 5% partout : jaune wake / vert trame OK / rouge trame KO"
          - version: "0.0.13"
            released: "2026-05-31"
            notes: "alignement du numéro de version avec pi0-lora (install.sh écrivait déjà 0.0.13 partout — versions 0.0.7..0.0.12 sautées, aucun pi0-wired field n'a vécu ces versions)"
          - version: "0.0.14"
            released: "2026-06-01"
            notes: "NEVER DEPLOYED (cf. note pi0-lora 0.0.14)."
          - version: "0.0.15"
            released: "2026-06-01"
            notes: "déployé sur ben-0003 via no-op 0.0.14 → 0.0.15 (cf. note pi0-lora 0.0.15)."
          - version: "0.0.16"
            released: "2026-06-01"
            notes: "fix update.sh apt redirect (cf. note pi0-lora 0.0.16). Idem pi0-lora — script update.sh partagé via symlink."
          - version: "0.0.17"
            released: "2026-06-01"
            notes: "tag publié buggy (cf. note pi0-lora 0.0.17). Voir 0.0.18."
          - version: "0.0.18"
            released: "2026-06-01"
            notes: "fix 0.0.17 (cf. note pi0-lora 0.0.18)."

  pi0-lora-wired:       # Raspberry Pi Zero W with both direct TIC (wired) and LoRa reception
    rev01:
      pi:
        latest: "0.0.2"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
            notes: "first dev release (published, no devices in field)"
          - version: "0.0.2"
            released: "2026-05-30"
            notes: "log-only baseline (Influx stripped, hostname rename)"
      arduino:
        minimum: "0.0.1"
        latest: "0.0.1"
        history:
          - version: "0.0.1"
            released: "2026-05-30"

