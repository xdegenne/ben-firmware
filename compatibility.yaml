          - version: "0.0.41"
            released: "2026-06-18"
            notes: "Courbe LoRa v0x04 : le récepteur décode la trame v0x04 (courbe PAPP batchée ~2 s, keyframe + deltas varint, HMAC-8) en plus de v0x02/v0x01. Réutilise db.py/local_api.py de 0.0.40 (curve_buckets + /curve agrégé) → /curve et /measurements identiques au wired. Saut 0.0.39→0.0.41 (0.0.40 = tag wired). Transition = restart ben-local-api + ben-lora-receiver, AUCUNE migration BDD. ⚠️ déployer le Pi AVANT de reflasher l'Arduino en 0.0.2 (un Pi 0.0.39 rejette le v0x04)."
          - version: "0.0.42"
            released: "2026-06-18"
            notes: "Chantier ISOUSC : le récepteur (wired ET lora) lit l'intensité souscrite et la stocke par PDL (level_profile.isousc, write-on-change). LoRa : ISOUSC dans la trame d'identité v0x01 (octet 13). /live expose isousc + maxVa (=ISOUSC×230) pour les réglages app + l'étalonnage de la jauge. Migration BDD = ALTER conditionnel (colonne isousc), idempotent. Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.43"
            released: "2026-06-23"
            notes: "Mode TIC STANDARD (Enedis-NOI-CPT_54E) bout-en-bout + dorsale stockage index bi-mode. Récepteur LoRa décode le v0x04 standard (papp NET SIGNÉ via src_standard, − = injection ; bloc ext EAIT ; horodate compteur → meter_ts, immunisée au délai radio) ; NTARF standard non mappé sur INDEX_NAMES (opaque) → clé générique (src_standard, index_id, index_value). Suppression du watchdog restart-sur-silence (inutile côté récepteur ; fraîcheur via heartbeat). MIGRATION BDD : ALTER ×5 (src_standard/index_id/index_value/inject_total/meter_ts), idempotente, NON bloquante, double-écriture base/hchc/hchp. /live expose tic_mode (standard/historique). Transition = restart ben-local-api + ben-lora-receiver. ⚠️ déployer le Pi AVANT de flasher l'Arduino standard (arduino 0.0.4)."
          - version: "0.0.44"
            released: "2026-06-23"
            notes: "LED de boot : remplace la séquence arc-en-ciel « disco » (~5 s, 9 couleurs) par 3 flashs bleus brefs au démarrage (aligné avec le wired). Cosmétique pur, AUCUNE migration. Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.45"
            released: "2026-06-23"
            notes: "Unpair « supprimer les données » (POST /unprovision?wipe=1) : on STOPPE le reader avant le rm de la base (wipe propre, plus de base ouverte en WAL) puis on ÉTEINT le boîtier (poweroff) au lieu de reboot → prépa livraison béta (part hors tension, rallumé par le testeur pour provisionner via l'app). Unpair simple (sans suppression) → reboot (re-pairing BLE) inchangé. Modif local_api.py. AUCUNE migration. Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.46"
            released: "2026-06-24"
            notes: "Trame courbe LoRa v0x05 : HORODATAGE PAR POINT. Chaque point porte son intervalle réel (dt en secondes, varint) depuis le précédent au lieu d'un period_ds uniforme supposé → le récepteur reconstruit t[i] = t0 + Σdt (courbe fidèle quelle que soit la cadence, trames ratées incluses). En standard le dt vient de l'horodate compteur (instant de mesure, sans dérive) → meter_ts exact ; en historique de millis(). Décodeur curve_codec.py expose sample_dt_s ; anchor_timestamps/meter_timestamps cumulent les dt. period_ds conservé comme moyenne/hint. Compat v0x04 RETIRÉE (un seul émetteur en service). AUCUNE migration BDD (ts/meter_ts déjà présents). Transition = restart ben-local-api + ben-lora-receiver. ⚠️ déployer le Pi AVANT de flasher l'Arduino 0.0.6 (un récepteur < 0.0.46 rejette le v0x05 → « 20 attendus »)."
          - version: "0.0.47"
            released: "2026-06-25"
            notes: "Désappairage : POST /unprovision ÉTEINT TOUJOURS le boîtier (poweroff), avec ou sans wipe (avant : reboot quand pas de wipe). Au prochain allumage, sans WiFi → mode configuration (BLE). Signal d'extinction uniforme. Modif local_api.py. AUCUNE migration. Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.48"
            released: "2026-06-26"
            notes: "Chantier ISOUSC STANDARD : calibrage de la jauge en mode standard via PREF (puiss. de réf., kVA — le standard ne fournit pas ISOUSC en A). db.py : colonne level_profile.pref (ALTER conditionnel idempotent) + record_pref/get_pref. lora-receiver : lit l'octet 14 de la trame boot v0x01 → record_pref (émetteur ≥ arduino 0.0.7 ; < 0.0.7 → octet 14 = 0, ignoré, rétro-compat). local_api : /live arbitre maxVa = standard ? pref×1000 : isousc×230 (+ expose pref). MIGRATION = ALTER pref (idempotente, non bloquante). Transition = restart ben-local-api + ben-lora-receiver. ⚠️ jauge LoRa standard nécessite AUSSI arduino 0.0.7."
          - version: "0.0.49"
            released: "2026-07-01"
            notes: "Chantier index énergie bi-mode, Lot B (exposition API). /live, /measurements et curve_buckets exposent désormais l'index GÉNÉRIQUE (index_id, index_value, src_standard, inject_total) : le coût/conso manquait en mode STANDARD où base/hchc/hchp sont NULL et l'index vit dans index_value. /live ajoute le flag producer (injection constatée → jauge bidir soutirage/injection de l'app). PERF : index COUVRANT idx_meas_pdl_ts_papp (pdl_index,ts,papp) remplace idx_meas_pdl_ts → l'agrégation /curve se résout depuis l'index (point chaud du 7j). MIGRATION = création index couvrant + DROP ancien au 1er db.connect (schéma, idempotent ; ~qq s one-shot sur grosse base, NON destructif, aucune perte). Exposition API purement ADDITIVE (app pas-à-jour intacte). Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.50"
            released: "2026-07-01"
            notes: "Chantier index énergie bi-mode, Lot B (suite) : endpoint /consumption. Le carry-forward (conso PAR REGISTRE sur une plage) est calculé SERVER-SIDE — Pi maintenant, cloud plus tard, MÊME contrat → l'app est agnostique du backend, logique non dupliquée. db.py : consumption(pdl,since,until) → {by_register:[{src_standard,index_id,wh}],total_wh} ; par registre MAX(index)-MIN(index) (index monotone → exact, immunisé au saut de registre ; COALESCE index_value/base/hchc/hchp → bi-mode + legacy histo). local_api : GET /consumption?pdl_index&since&until. L'app applique le prix (Σ wh×prix moyen aujourd'hui ; par registre à terme = coût à l'euro près, rétroactif, sans changer le contrat). AUCUNE migration (lecture seule sur colonnes existantes). Endpoint ADDITIF (app pas-à-jour intacte). Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.51"
            released: "2026-07-01"
            notes: "Robustesse aux index_value=0 parasites. Un index compteur cumulatif n'est JAMAIS 0 ; des index_value=0 (carry-forward EASF empoisonné côté émetteur — cause racine à confirmer, cf. chantier Arduino) faisaient renvoyer par /consumption l'index ABSOLU (MAX-MIN, ~15 MWh → coût délirant, ex. 2957 €/jour). db.py : /consumption filtre COALESCE(...) > 0 (au lieu de IS NOT NULL) ; écriture (_generic_cols) normalise index_value=0 → NULL (donnée BRUTE propre : courbe, /measurements, futur cloud). AUCUNE migration (garde en lecture + normalisation des nouvelles écritures ; les 0 déjà stockés restent mais /consumption les ignore). Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.52"
            released: "2026-07-02"
            notes: "Deux ajouts Pi-side, low-risk. (1) CHECKPOINT WAL périodique : db.prune() fait PRAGMA wal_checkpoint(TRUNCATE) (~1×/h) → le fichier -wal, qui ne se tronque jamais seul (observé 392 Mo sur ben-0001 → ralentit toutes les lectures), reste borné. Maintenance pure, aucune donnée modifiée. (2) INSTRUMENTATION index=0 : le récepteur logge un WARNING greppable INDEX0 (batch_seq/NTARF/rssi/snr/gap) quand l'émetteur envoie un keyframe index_value=0 → capture le contexte de la cause racine (carry-forward EASF empoisonné côté Arduino, à corréler). AUCUNE migration. Transition = restart ben-local-api + ben-lora-receiver."
          - version: "0.0.53"
            released: "2026-07-02"
            notes: "MIGRATION backfill index générique legacy. db.connect() dérive index_id/index_value de tariff + base/hchc/hchp pour les vieilles lignes histo (index_value NULL, d'avant que le reader ne peuple la générique en pi-0.0.43). Sans ça /consumption fait COALESCE(index_value,base,hchc,hchp) qui écrase HC et HP dans une seule colonne → sur-comptage (~+30 % mesuré sur legacy HC/HP, ben-0003 : 43486 au lieu de 33252 Wh sur 7j). ONE-SHOT via user_version, idempotent. UPDATE en masse au 1er db.connect du reader après MAJ (~qq s ; ben-0001 ~315k lignes) → démarrage un peu plus lent cette fois-là. Données non perdues, index_value peuplé. Transition = restart ben-lora-receiver + ben-local-api."
          - version: "0.0.54"
            released: "2026-07-03"
            notes: "Chantier « unification labels + contrat ». Récepteur LoRa : décode l'EXT COURBE v2 (flag bit7) = EAIT + LTARF (label tarif standard) + DIAG index=0 ; contrat NGTF (standard) / OPTARIF (histo) dans la trame boot v0x01 (octet 15 = longueur, 16.. = ascii ; borne relâchée 15..32 o). Résolution de label UNIFIÉE côté serveur (resolve_label : standard=LTARF autoritatif via tariff_labels / histo=convention statique HISTO_LABELS) + API : /live.tariff_label + /live.contract + nouvel endpoint /registers (registres + index par tarif + contrat). Stockage : table tariff_labels keyée (pdl,src,index_id,ngtf) — segmentée par CONTRAT — + colonne level_profile.ngtf. STRICTEMENT ADDITIF : aucun champ /live retiré ni renommé → app legacy inchangées, wired histo intact. MIGRATION idempotente au 1er db.connect (CREATE tariff_labels avec la nouvelle PK + ALTER level_profile.ngtf ; drop/recreate tariff_labels si ancienne PK). Transition = restart ben-lora-receiver + ben-local-api. NB : les nouveaux champs restent dormants tant que l'émetteur n'émet pas LTARF/contrat (arduino ≥ 0.0.9) — rétro-compatible (trames actuelles décodées à l'identique)."
      arduino:
        minimum: "0.0.1"
        latest: "0.0.9"
        history:
          - version: "0.0.1"
            released: "2026-05-30"
          - version: "0.0.2"
            released: "2026-06-18"
            notes: "Émetteur v0x04 : courbe PAPP fine batchée (capture continue, flush 60 s, LowPower retiré). Parseur TIC réécrit char-based (corrige une corruption de heap String qui rendait PTEC vide → trames courbe jamais émises). Remplace v0x02 (l'émetteur n'émet plus de v0x02). minimum reste 0.0.1 : les anciens émetteurs v0x02 restent décodés par le Pi 0.0.41 (rétro-compat récepteur)."
          - version: "0.0.3"
            released: "2026-06-18"
            notes: "Chantier ISOUSC : l'émetteur parse ISOUSC et le place dans la trame d'identité v0x01 (octet 13). Ré-émet le boot frame au démarrage ET sur changement d'abonnement. Rétro-compatible (octet de padding réservé). minimum reste 0.0.1."
          - version: "0.0.4"
            released: "2026-06-23"
            notes: "Mode TIC STANDARD : décodage 9600 + auto-détection historique↔standard (mode persisté EEPROM 0x20, re-discovery sur échec prolongé) + parseur standard (séparateur HT, checksum HT-de-queue inclus). Trame v0x04 standard : papp NET SIGNÉ (SINSTS + / SINSTI − ; flag src_standard), horodate compteur DATE → ts (flag ts_valid), EAIT → bloc extension (flag has_ext). Identité v0x01 inchangée (ADCO ← ADSC ; ISOUSC=0 en standard, calibrage PREF différé). minimum reste 0.0.1. ⚠️ flasher APRÈS avoir déployé le Pi récepteur en pi-0.0.43 (un récepteur < 0.0.43 misread le papp signé)."
          - version: "0.0.5"
            released: "2026-06-23"
            notes: "Echo de la version firmware au boot (Serial : « tic-reader boot v0.0.5 ») pour confirmer au debug quelle version est flashée. Aucun changement fonctionnel (FW_VERSION + 1 println). minimum reste 0.0.1."
          - version: "0.0.6"
            released: "2026-06-24"
            notes: "Émetteur v0x05 : horodatage PAR POINT. curveAdd envoie un dt (secondes, varint) par échantillon — en standard l'écart d'horodate compteur (todSeconds), en historique l'écart millis() sans dérive cumulative. period_ds devient la moyenne réelle du batch (hint). FIX DÉBIT : UART TIC ouvert en continu (ticSerialBegin begin-once) au lieu de Serial.begin/end par trame → fini la fenêtre aveugle, ~1 trame/s (n≈58/batch au lieu de ~30). Carry-forward NTARF+EASF (index quasi-statique → un drop de ligne ne jette plus le point). Garde standard = PAPP + horodate valide ; drop de ligne = skip SILENCIEUX (plus de rouge). LED : bleu=lecture trame, blanc=émission LoRa, vert=ACK, rouge réservé Vcc(1×)/pas-de-TIC(2×). Debug Serial par trame retiré. minimum reste 0.0.1. ⚠️ flasher APRÈS avoir déployé le Pi en pi-0.0.46 (un récepteur < 0.0.46 rejette le v0x05)."
          - version: "0.0.7"
            released: "2026-06-26"
            notes: "Chantier ISOUSC standard : l'émetteur parse PREF (puiss. de réf., kVA, mode standard) et le place dans la trame d'identité v0x01 (octet 14 ; octet 13 reste ISOUSC histo). Ré-émet le boot frame au démarrage ET sur changement d'abonnement (ISOUSC ou PREF). Rétro-compatible (octet de padding réservé ; récepteur < pi-0.0.48 ignore l'octet 14). minimum reste 0.0.1. À flasher avec le Pi en pi-0.0.48 (qui lit l'octet 14)."
          - version: "0.0.8"
            released: "2026-07-02"
            notes: "Chantier labels + fix index=0. (1) GARDE index=0 : en standard, ne pas démarrer la courbe tant que lastStdIndex==0 (cold-start post-reboot : NTARF vu mais EASF pas encore capté → keyframe figée à 0 sur tout le batch) → on saute la trame, le batch démarre à la suivante avec le vrai index (au pire 1 point perdu). Cause confirmée par l'instrumentation INDEX0 (pi-0.0.52). (2) LTARF : parsé + transporté dans l'ext courbe v2 (flag bit7, ext_fields bit1), on-change de NTARF, dédup + re-tx jusqu'à ACK → label tarif standard autoritatif. (3) NGTF : parsé + ajouté à la trame boot v0x01 (octet 15 = len, 16.. = ascii). minimum reste 0.0.1. ⚠️ flasher APRÈS avoir déployé le Pi récepteur en pi-0.0.54 (qui décode l'ext v2 + la trame boot étendue). Rétro-compatible : un récepteur < pi-0.0.54 ignore l'ext v2 (frames décodées à l'identique)."
          - version: "0.0.9"
            released: "2026-07-03"
            notes: "Contrat mode-agnostique dans la trame boot : contractOf(v) = NGTF en standard / OPTARIF en historique (le champ 'contrat' de la trame boot porte l'un ou l'autre selon le mode) → le récepteur le stocke comme contrat (level_profile.ngtf) quel que soit le mode. Complète 0.0.8 (qui n'envoyait NGTF qu'en standard). Aucun impact sur un émetteur standard (contractOf renvoie NGTF, identique à 0.0.8) — l'ajout OPTARIF ne sert qu'en histo. minimum reste 0.0.1. À flasher avec le Pi ≥ pi-0.0.54."

