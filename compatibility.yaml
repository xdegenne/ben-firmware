          - version: "0.0.37"
            released: "2026-06-08"
            notes: "API locale : POST /unprovision corrigé. Bug : on supprimait la connexion WiFi AVANT de répondre → couper `ben-provisioned` tue le lien TCP, l'app ne recevait jamais l'ack (et le diagnostic était aveugle car l'API silence log_message par défaut). Fix : on répond d'abord, PUIS désappairage + reboot en ASYNCHRONE (threading.Timer 2 s) ; on oublie TOUTES les connexions WiFi (ben-provisioned + éventuel profil opérateur `wifi` du golden, qui sinon reconnectait en autoconnect) ; ajout de logs « [unprovision] … ». update.sh : restart ben-local-api ; pas de reboot."
          - version: "0.0.38"
            released: "2026-06-08"
            notes: "Provisioning BLE — phase d'APPRENTISSAGE des couleurs avant le test d'association. led.py : la boucle de séquence accepte un callback (on_show + tokens) qui notifie la couleur affichée. main.py : 2 caracs GATT — PREVIEW_CMD (…0007, write '1'/'0') et PREVIEW_COLOR (…0008, read|notify B|Y|W|R|-). '1' joue les 4 couleurs en boucle (ordre fixe BYWR) en notifiant la couleur courante (l'app surligne la pastille en synchro) ; '0' (bouton Suivant) arrête et enchaîne sur le code de test. Repli : si l'app ne pilote pas PREVIEW, le code de test s'affiche après VERIFY_DISPLAY_DELAY_SEC comme avant. Durée d'affichage de chaque couleur du CODE de test allongée (VERIFY_ON_SEC=1.3 s) pour laisser le temps de lire. Provisioner on-demand → pris au prochain mode BLE, rien à redémarrer, pas de reboot. Côté app : nouvel écran « Repérez les couleurs » entre le scan et le test."
          - version: "0.0.39"
            released: "2026-06-08"
            notes: "Provisioning BLE — 2 corrections UX de la LED. (1) Échec WiFi (ex. mauvais mot de passe) : le BLE reste connecté et l'utilisateur peut re-saisir → set_status() ne rejoue PLUS le blink violet/jaune (« aucun téléphone, à configurer ») qui laissait croire à un reset ; on garde les 3 flashs rouges (échec) puis on ÉTEINT (état « connecté, en attente de saisie »). (2) Fin de l'apprentissage des couleurs (PREVIEW_CMD='0') : on arrête la boucle + éteint, puis on attend VERIFY_AFTER_PREVIEW_SEC (3 s) avant de démarrer le code de test, le temps d'arriver sur l'écran de test sans rater le début. Provisioner on-demand → rien à redémarrer, pas de reboot."
          - version: "0.0.40"
            released: "2026-06-13"
            notes: "Courbe temps réel (pi-wired). Lecture TIC AU FIL DE L'EAU (suppression du sleep 15s, event-driven sur la trame → courbe fine ~1,5s au lieu de 1/15s) + écritures BDD BATCHÉES (1 commit/15s via executemany → ménage la SD malgré ~7× plus de points). API : nouvel endpoint /curve (agrégé min/max/avg, bucketing ABSOLU + quantifié pour stabilité au pan, centroïde temporel, index porté) ; /measurements degrade-safe (agrège au lieu de tronquer) ; /pdls expose first_ts. db.py/local_api.py partagés mais ADDITIFS (pas de changement de schéma, reader LoRa intact) → seuls les wired bumpent. AUCUNE migration. update.sh = restart ben-tic-reader + ben-local-api."
          - version: "0.0.42"
            released: "2026-06-18"
            notes: "Chantier ISOUSC : lecture + stockage de l'intensité souscrite par PDL (level_profile.isousc, write-on-change) ; le wired la lit dans chaque trame TIC (étiquette ISOUSC). /live expose isousc + maxVa (=ISOUSC×230) pour les réglages app + l'étalonnage de la jauge. Migration BDD = ALTER conditionnel (colonne isousc), idempotent. Transition = restart ben-tic-reader + ben-local-api."
          - version: "0.0.43"
            released: "2026-06-23"
            notes: "Mode TIC STANDARD (Enedis-NOI-CPT_54E) bout-en-bout + dorsale stockage index bi-mode. main_uart.py BI-MODE : auto-détection historique↔standard au boot (sonde 1200/9600, mode persisté tic-state.json, re-détection sur silence via watchdog) ; parseur standard (séparateur HT, checksum HT-de-queue inclus, horodate DATE→meter_ts) ; papp = SINSTS net signé. Stockage GÉNÉRIQUE (src_standard, index_id=NTARF, index_value=EASF[NTARF]) + inject_total (EAIT) + meter_ts. MIGRATION BDD : ALTER ×5 (src_standard/index_id/index_value/inject_total/meter_ts), idempotente, NON bloquante, double-écriture base/hchc/hchp. /live expose tic_mode. Transition = restart ben-tic-reader + ben-local-api."

