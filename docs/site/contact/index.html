<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>BEN — Nous contacter</title>
  <meta name="description" content="Une question sur BEN ? Écrivez-nous, on vous répond." />
  <style>
    :root { --green:#2e7d32; --green-soft:#f3f8f3; --navy:#1b2a52;
      --ink:#1b1b1b; --muted:#5a5a5a; --bg:#ffffff; --line:#ececec; }
    * { box-sizing:border-box; -webkit-text-size-adjust:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink); background:var(--bg); line-height:1.6;
      max-width:560px; margin:0 auto; padding:24px 18px 64px;
    }
    .logo { display:block; height:52px; margin:0 auto 6px; }
    .hero { text-align:center; margin:6px 0 22px; }
    .hero .mascot { width:96px; height:auto; }
    h1 { color:var(--green); font-size:1.5rem; margin:6px 0; }
    .lead { color:var(--muted); margin:6px auto 0; }
    form { margin-top:18px; }
    label { display:block; font-weight:600; margin:16px 0 6px; }
    input, textarea {
      width:100%; font-family:inherit; font-size:1rem; color:var(--ink);
      padding:12px 14px; border:1px solid #ccc; border-radius:10px; background:#fff;
    }
    input:focus, textarea:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(46,125,50,.15); }
    textarea { min-height:140px; resize:vertical; }
    button {
      width:100%; margin-top:22px; font-family:inherit; font-size:1.05rem; font-weight:700;
      color:#fff; background:var(--green); border:0; border-radius:12px; padding:15px; cursor:pointer;
    }
    button:active { opacity:.9; }
    .note { background:var(--green-soft); border-left:4px solid var(--green);
      padding:12px 16px; border-radius:8px; margin:20px 0; font-size:.92rem; }
    .note strong { color:var(--green); }
    footer { margin-top:34px; color:var(--muted); font-size:.84rem;
      border-top:1px solid var(--line); padding-top:14px; text-align:center; }
    footer a { color:var(--green); }
  </style>
</head>
<body>

  <img class="logo" src="ben_logo.png" alt="BEN" />

  <div class="hero">
    <img class="mascot" src="ben_bonjour.png" alt="La mascotte BEN" />
    <h1>Une question ? Écrivez-nous 💬</h1>
    <p class="lead">On vous répond avec plaisir.</p>
  </div>

  <form id="contact">
    <label for="nom">Votre nom</label>
    <input type="text" id="nom" name="nom" placeholder="Camille Dupont" autocomplete="name" required />

    <label for="email">Votre email</label>
    <input type="email" id="email" name="email" placeholder="camille@exemple.fr" autocomplete="email" required />

    <label for="msg">Votre message</label>
    <textarea id="msg" name="msg" placeholder="Bonjour, j'ai une question sur…" required></textarea>

    <button type="submit">Envoyer le message</button>
  </form>

  <div class="note">
    En cliquant sur « Envoyer », votre application de messagerie s'ouvre avec le message
    <strong>déjà pré-rempli</strong> — il ne vous reste qu'à l'envoyer. 🙂
  </div>

  <footer>
    BEN — votre conso électrique, simplement. ·
    <a href="../install/">Installation</a> · <a href="../privacy/">Confidentialité</a>
  </footer>

  <script>
    document.getElementById('contact').addEventListener('submit', function (e) {
      e.preventDefault();
      var nom = document.getElementById('nom').value.trim();
      var email = document.getElementById('email').value.trim();
      var msg = document.getElementById('msg').value.trim();
      var to = ['xavier', 'degenne'].join('.') + '@' + ['gmail', 'com'].join('.');
      var subject = 'Contact BEN — ' + (nom || 'sans nom');
      var body = 'De : ' + nom + ' <' + email + '>\n\n' + msg;
      window.location.href = 'mailto:' + to +
        '?subject=' + encodeURIComponent(subject) +
        '&body=' + encodeURIComponent(body);
    });
  </script>

</body>
</html>
